<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 — Eray Balat</title>
<meta name="robots" content="noindex,follow" />
<meta name="theme-color" content="#080c16" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#080c16;--c1:#5cc8ff;--c2:#2e9bf0;--text:#eaf2ff;--muted:#8fa3c4}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse 80% 60% at 50% 0%,#0e1626,#080c16 70%);
    color:var(--text);font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    min-height:100%;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:28px;overflow:hidden}
  .wrap{max-width:560px;position:relative;z-index:1}
  .star{width:74px;height:74px;margin:0 auto 26px;animation:pulse 3.4s ease-in-out infinite;filter:drop-shadow(0 0 16px rgba(92,200,255,.5))}
  h1{font-family:'Poppins',sans-serif;font-weight:700;font-size:clamp(4rem,18vw,7rem);line-height:1;
     background:linear-gradient(135deg,#5cc8ff,#2e9bf0 55%,#f5c542);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.01em}
  h2{font-family:'Poppins',sans-serif;font-weight:600;font-size:clamp(1.1rem,4.5vw,1.5rem);margin:12px 0 10px}
  p{color:var(--muted);font-size:1rem;line-height:1.6;margin-bottom:30px}
  .btn{display:inline-flex;align-items:center;gap:9px;text-decoration:none;color:#061020;font-family:'Poppins',sans-serif;font-weight:600;
       font-size:.98rem;padding:13px 26px;border-radius:14px;
       background:linear-gradient(135deg,#5cc8ff,#2e9bf0);box-shadow:0 14px 38px -14px rgba(46,155,240,.75);transition:transform .2s,box-shadow .2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 20px 46px -14px rgba(46,155,240,.9)}
  .sub{margin-top:16px;font-size:.82rem;color:#5f7595}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.07);opacity:1}}
</style>
</head>
<body>
  <div class="wrap">
    <svg class="star" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs><radialGradient id="g" cx="47%" cy="43%" r="60%">
        <stop offset="0%" stop-color="#2ba2d4"/><stop offset="48%" stop-color="#0e5b90"/><stop offset="100%" stop-color="#06142e"/>
      </radialGradient></defs>
      <path d="M50 3 L63.77 16.77 L83.23 16.77 L83.23 36.23 L97 50 L83.23 63.77 L83.23 83.23 L63.77 83.23 L50 97 L36.23 83.23 L16.77 83.23 L16.77 63.77 L3 50 L16.77 36.23 L16.77 16.77 L36.23 16.77 Z" fill="url(#g)" stroke="#06142e" stroke-width="1.2" stroke-linejoin="round"/>
    </svg>
    <h1>404</h1>
    <h2>Page not found · Sayfa bulunamadı</h2>
    <p>The page you're looking for doesn't exist or has moved.<br/>Aradığın sayfa yok ya da taşınmış.</p>
    <a class="btn" href="/">← Back to home · Ana sayfa</a>
    <div class="sub">Eray Balat — Creative AI Producer &amp; Filmmaker</div>
  </div>
</body>
</html>
